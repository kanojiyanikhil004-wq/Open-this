        <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing Heart</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
  color:white;
}

.top{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:24px;
  color:#ff6b6b;
}

.msg{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:16px;
  color:#ff4da6;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<div class="top">It's your birthday 💖🥳</div>
<div class="msg" id="msg"></div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function drawHeart(){
  let cx = c.width/2;
  let cy = c.height/2;

  ctx.save();
  ctx.shadowColor = "#ff4da6";
  ctx.shadowBlur = 20;
  ctx.fillStyle = "#ff4da6";

  ctx.beginPath();

  for(let t=0;t<Math.PI*2;t+=0.01){
    let x = 16*Math.pow(Math.sin(t),3);
    let y = 13*Math.cos(t)
      -5*Math.cos(2*t)
      -2*Math.cos(3*t)
      -Math.cos(4*t);

    let scale = Math.min(c.width,c.height)/45;

    x = x*scale + cx;
    y = -y*scale + cy;

    ctx.lineTo(x,y);
  }

  ctx.fill();
  ctx.restore();
}

function animate(){
  ctx.clearRect(0,0,c.width,c.height);
  drawHeart();
  requestAnimationFrame(animate);
}
animate();

/* 💖 YOUR CUSTOM MESSAGES (FIXED) */
const messages = [
  "Happy birthday Jyoti 💗🕊️",
  "You are special that's hard to explain, so that's why I'm not goint explain 😁,you make everything beautiful 💗😊",
  "You don't try to be anything extra, you're just you — and that's what makes you so lovely 💖",
  "Once again happy birthday to you, enjoy your special day ❤️"
];

let i=0;

function show(){
  if(i < messages.length){
    document.getElementById("msg").innerHTML += messages[i] + "<br>";
    i++;
    setTimeout(show,1500);
  }
}
show();

</script>

</body>
</html>
